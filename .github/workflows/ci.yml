name: Static Site CI
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Build static site
        run: |
          mkdir build
          cp index.html build/
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build/

